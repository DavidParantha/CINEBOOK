services:
  # 1. Eureka Server
  - type: web
    name: eureka-server
    env: docker
    dockerContext: ./backend/eureka-server
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    
  # 2. Profile Service
  - type: web
    name: profile-service
    env: docker
    dockerContext: ./backend/profile-service
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: cinebook-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: cinebook-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: cinebook-db
          property: password
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/

  # 3. Gateway Service
  - type: web
    name: gateway
    env: docker
    dockerContext: ./backend/gateway
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/

databases:
  # 4. PostgreSQL Database
  - name: cinebook-db
    plan: free
    postgresMajorVersion: 15
